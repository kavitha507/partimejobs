<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Jobs - Registration & Listings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.5s ease-out;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 36px;
            color: #667eea;
        }

        .date-display {
            color: #6b7280;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Registration Form */
        .registration-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: slideUp 0.6s ease-out;
        }

        .section-title {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f3f4f6;
        }

        .section-title i {
            color: #667eea;
            font-size: 28px;
        }

        .registration-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            color: #4b5563;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group label i {
            color: #667eea;
            width: 20px;
        }

        .form-group input,
        .form-group select {
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
            background: white;
        }

        .register-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            grid-column: 1 / -1;
            margin-top: 10px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        .student-info-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            display: none;
            border-left: 5px solid #667eea;
            animation: slideIn 0.5s ease-out;
        }

        .student-info-card.show {
            display: block;
        }

        .student-info-card h3 {
            color: #1f2937;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .student-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .detail-item {
            background: white;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .detail-item strong {
            color: #4b5563;
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .detail-item span {
            color: #1f2937;
            font-weight: 600;
            font-size: 16px;
        }

        /* Category Filters */
        .category-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .category-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .category-chip {
            background: #f3f4f6;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid transparent;
        }

        .category-chip:hover {
            transform: translateY(-2px);
            background: #e5e7eb;
        }

        .category-chip.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }

        .category-chip i {
            font-size: 16px;
        }

        /* Search Bar */
        .search-bar {
            background: white;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .search-bar select {
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            min-width: 180px;
            background: white;
        }

        /* Jobs Grid */
        .jobs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .job-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.5s ease-out;
            animation-fill-mode: both;
        }

        .job-card:nth-child(1) { animation-delay: 0.1s; }
        .job-card:nth-child(2) { animation-delay: 0.15s; }
        .job-card:nth-child(3) { animation-delay: 0.2s; }
        .job-card:nth-child(4) { animation-delay: 0.25s; }
        .job-card:nth-child(5) { animation-delay: 0.3s; }
        .job-card:nth-child(6) { animation-delay: 0.35s; }
        .job-card:nth-child(7) { animation-delay: 0.4s; }
        .job-card:nth-child(8) { animation-delay: 0.45s; }
        .job-card:nth-child(9) { animation-delay: 0.5s; }
        .job-card:nth-child(10) { animation-delay: 0.55s; }
        .job-card:nth-child(11) { animation-delay: 0.6s; }
        .job-card:nth-child(12) { animation-delay: 0.65s; }

        .job-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .job-category-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .job-card h3 {
            font-size: 20px;
            color: #1f2937;
            margin-bottom: 10px;
            padding-right: 100px;
        }

        .job-company {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .job-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .job-detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #4b5563;
            font-size: 14px;
        }

        .job-detail-item i {
            width: 20px;
            color: #667eea;
        }

        .job-salary {
            font-size: 24px;
            font-weight: bold;
            color: #10b981;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .job-salary small {
            font-size: 14px;
            color: #6b7280;
            font-weight: normal;
        }

        .job-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f3f4f6;
        }

        .job-type {
            background: #f3f4f6;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #4b5563;
        }

        .apply-job-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .apply-job-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .apply-job-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .applied-badge {
            background: #10b981;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Email Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f3f4f6;
        }

        .modal-header h2 {
            font-size: 24px;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header h2 i {
            color: #667eea;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #6b7280;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #ef4444;
        }

        .email-preview {
            background: #f8fafc;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #e5e7eb;
        }

        .email-header {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #e5e7eb;
        }

        .email-header-item {
            flex: 1;
        }

        .email-header-item label {
            display: block;
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
        }

        .email-header-item div {
            font-weight: 600;
            color: #1f2937;
        }

        .email-body {
            line-height: 1.6;
            color: #4b5563;
        }

        .email-body p {
            margin-bottom: 15px;
        }

        .email-details-box {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #667eea;
        }

        .send-email-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 20px;
        }

        .send-email-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16,185,129,0.4);
        }

        /* Email Log */
        .email-log-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .email-log {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .email-log-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #10b981;
        }

        .email-log-item i {
            color: #10b981;
        }

        .email-log-item .email-time {
            font-size: 12px;
            color: #6b7280;
            margin-left: auto;
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .jobs-grid {
                grid-template-columns: 1fr;
            }

            .search-bar {
                flex-direction: column;
            }

            .search-bar select {
                width: 100%;
            }

            .registration-form {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            color: #1f2937;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
            border-left: 5px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification i {
            font-size: 24px;
        }

        .notification.success i {
            color: #10b981;
        }

        .notification.error i {
            color: #ef4444;
        }

        /* Stats */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #6b7280;
            font-size: 14px;
        }
    </style>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <i class="fas fa-briefcase"></i>
                StudentJob Portal
            </div>
            <div class="date-display">
                <i class="far fa-calendar-alt"></i>
                <span id="currentDate"></span>
            </div>
        </header>

        <!-- Registration Section -->
        <div class="registration-section">
            <div class="section-title">
                <i class="fas fa-user-graduate"></i>
                Student Registration
            </div>
            
            <div class="registration-form" id="registrationForm">
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Roll Number *</label>
                    <input type="text" id="rollNumber" placeholder="e.g., 2024CS101" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name *</label>
                    <input type="text" id="studentName" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address *</label>
                    <input type="email" id="studentEmail" placeholder="e.g., student@college.edu" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-mobile-alt"></i> Mobile Number *</label>
                    <input type="tel" id="mobileNumber" placeholder="e.g., 9876543210" pattern="[0-9]{10}" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-briefcase"></i> Interested Job Category *</label>
                    <select id="interestedCategory" required>
                        <option value="">Select preferred category</option>
                        <option value="tutoring">Tutoring & Teaching</option>
                        <option value="food">Food & Beverage</option>
                        <option value="delivery">Delivery & Logistics</option>
                        <option value="campus">Campus Jobs</option>
                        <option value="retail">Retail & Sales</option>
                        <option value="it">IT & Technical</option>
                        <option value="creative">Creative & Design</option>
                        <option value="admin">Administrative</option>
                    </select>
                </div>
                
                <button class="register-btn" onclick="registerStudent()">
                    <i class="fas fa-check-circle"></i>
                    Register & View Jobs
                </button>
            </div>

            <!-- Student Info Card (Hidden initially) -->
            <div class="student-info-card" id="studentInfoCard">
                <h3><i class="fas fa-user-check"></i> Student Profile</h3>
                <div class="student-details" id="studentDetails"></div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-container" id="statsContainer" style="display: none;">
            <div class="stat-box">
                <div class="stat-number" id="appliedCount">0</div>
                <div class="stat-label">Jobs Applied</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="interestedCount">0</div>
                <div class="stat-label">In Your Category</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="totalJobs">12</div>
                <div class="stat-label">Total Jobs</div>
            </div>
        </div>

        <!-- Email Log Section -->
        <div class="email-log-section" id="emailLogSection" style="display: none;">
            <div class="section-title">
                <i class="fas fa-envelope-open-text"></i>
                Email Confirmation Log
            </div>
            <div class="email-log" id="emailLog"></div>
        </div>

        <!-- Category Filters -->
        <div class="category-section" id="jobSection" style="display: none;">
            <div class="section-title">
                <i class="fas fa-filter"></i>
                Browse Jobs by Category
            </div>
            
            <div class="category-filters" id="categoryFilters">
                <span class="category-chip active" onclick="filterJobs('all')">
                    <i class="fas fa-th-large"></i> All Jobs (12)
                </span>
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Search jobs by title, company, or location..." onkeyup="searchJobs()">
                <select id="salaryFilter" onchange="filterBySalary()">
                    <option value="all">💰 All Salaries</option>
                    <option value="0-150">Under ₹150/hr</option>
                    <option value="150-200">₹150 - ₹200/hr</option>
                    <option value="200-250">₹200 - ₹250/hr</option>
                    <option value="250+">₹250+/hr</option>
                </select>
            </div>

            <!-- Jobs Grid -->
            <div class="jobs-grid" id="jobsGrid"></div>
        </div>
    </div>

    <!-- Email Modal -->
    <div class="modal" id="emailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-envelope"></i> Application Confirmation Email</h2>
                <button class="close-btn" onclick="closeEmailModal()">&times;</button>
            </div>
            
            <div class="email-preview" id="emailPreview">
                <!-- Dynamic email content will be inserted here -->
            </div>
            
            <button class="send-email-btn" onclick="sendConfirmationEmail()">
                <i class="fas fa-paper-plane"></i>
                Send Confirmation Email
            </button>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <i class="fas" id="notificationIcon"></i>
        <span id="notificationMessage"></span>
    </div>

    <script>
        // Student data
        let currentStudent = null;
        let appliedJobs = [];
        let emailLog = [];

        // Job categories with colors
        const categories = {
            'tutoring': { name: 'Tutoring', color: '#f59e0b', icon: 'fa-chalkboard-teacher' },
            'food': { name: 'Food & Beverage', color: '#ef4444', icon: 'fa-utensils' },
            'delivery': { name: 'Delivery', color: '#3b82f6', icon: 'fa-truck' },
            'campus': { name: 'Campus', color: '#10b981', icon: 'fa-book' },

        // Set current date
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });

        // Register student function
        function registerStudent() {
            const roll = document.getElementById('rollNumber').value.trim();
            const name = document.getElementById('studentName').value.trim();
            const email = document.getElementById('studentEmail').value.trim();
            const mobile = document.getElementById('mobileNumber').value.trim();
            const category = document.getElementById('interestedCategory').value;

            if (!roll || !name || !email || !mobile || !category) {
                showNotification('Please fill in all fields!', 'error');
                return;
            }

            if (!/^\d{10}$/.test(mobile)) {
                showNotification('Please enter a valid 10-digit mobile number!', 'error');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showNotification('Please enter a valid email address!', 'error');
                return;
            }

            currentStudent = {
                roll,
                name,
                email,
                mobile,
                category
            };

            // Show student info
            document.getElementById('studentDetails').innerHTML = `
                <div class="detail-item">
                    <strong>Roll Number</strong>
                    <span>${roll}</span>
                </div>
                <div class="detail-item">
                    <strong>Full Name</strong>
                    <span>${name}</span>
                </div>
                <div class="detail-item">
                    <strong>Email</strong>
                    <span>${email}</span>
                </div>
                <div class="detail-item">
                    <strong>Mobile</strong>
                    <span>${mobile}</span>
                </div>
                <div class="detail-item">
                    <strong>Interested in</strong>
                    <span>${categories[category].name}</span>
                </div>
            `;

            document.getElementById('studentInfoCard').classList.add('show');
            document.getElementById('jobSection').style.display = 'block';
            document.getElementById('statsContainer').style.display = 'grid';
            document.getElementById('emailLogSection').style.display = 'block';

            // Create category filters
            createCategoryFilters();
            
            // Display jobs
            displayJobs('all');

            // Send registration confirmation email
            sendRegistrationEmail();

            showNotification(`Welcome ${name}! Check your email for registration confirmation.`, 'success');
        }

        // Send registration confirmation email
        function sendRegistrationEmail() {
            const emailContent = {
                to: currentStudent.email,
                subject: '🎓 Welcome to StudentJob Portal - Registration Successful',
                body: `
                    <h3>Dear ${currentStudent.name},</h3>
                    <p>Thank you for registering with StudentJob Portal! Your account has been successfully created.</p>
                    
                    <div style="background: #f8fafc; padding: 15px; border-radius: 10px; margin: 15px 0;">
                        <h4>Registration Details:</h4>
                        <p><strong>Roll Number:</strong> ${currentStudent.roll}</p>
                        <p><strong>Email:</strong> ${currentStudent.email}</p>
                        <p><strong>Mobile:</strong> ${currentStudent.mobile}</p>
                        <p><strong>Interested Category:</strong> ${categories[currentStudent.category].name}</p>
                        <p><strong>Registration Date:</strong> ${new Date().toLocaleString()}</p>
                    </div>
                    
                    <p>You can now browse and apply to part-time jobs that match your interests. Good luck with your job search!</p>
                    
                    <p>Best regards,<br>StudentJob Portal Team</p>
                `
            };

            addToEmailLog(emailContent);
        }

        // Variable to store current job being applied
        let currentJob = null;

        // Apply for job
        function applyForJob(jobId) {
            if (!currentStudent) {
                showNotification('Please register first!', 'error');
                return;
            }

            if (appliedJobs.includes(jobId)) {
                showNotification('You have already applied for this job!', 'error');
                return;
            }

            currentJob = jobs.find(j => j.id === jobId);
            
            // Show email modal
            showEmailModal(currentJob);
        }

        // Show email modal
        function showEmailModal(job) {
            const modal = document.getElementById('emailModal');
            const preview = document.getElementById('emailPreview');
            
            const applicationDate = new Date().toLocaleString();
            
            preview.innerHTML = `
                <div class="email-header">
                    <div class="email-header-item">
                        <label>To:</label>
                        <div>${currentStudent.email}</div>
                    </div>
                    <div class="email-header-item">
                        <label>Subject:</label>
                        <div>✅ Application Received: ${job.title}</div>
                    </div>
                </div>
                <div class="email-body">
                    <p>Dear <strong>${currentStudent.name}</strong>,</p>
                    <p>Thank you for applying to <strong>${job.title}</strong> at <strong>${job.company}</strong>. Your application has been received and is being processed.</p>
                    
                    <div class="email-details-box">
                        <h4>Application Details:</h4>
                        <p><strong>Job Title:</strong> ${job.title}</p>
                        <p><strong>Company:</strong> ${job.company}</p>
                        <p><strong>Location:</strong> ${job.location}</p>
                        <p><strong>Salary:</strong> ₹${job.salary}/hour</p>
                        <p><strong>Schedule:</strong> ${job.hours} • ${job.schedule}</p>
                        <p><strong>Application Date:</strong> ${applicationDate}</p>
                        <p><strong>Application ID:</strong> APP-${job.id}-${Date.now().toString().slice(-6)}</p>
                    </div>
                    
                    <h4>Your Profile:</h4>
                    <ul>
                        <li>Roll Number: ${currentStudent.roll}</li>
                        <li>Name: ${currentStudent.name}</li>
                        <li>Email: ${currentStudent.email}</li>
                        <li>Mobile: ${currentStudent.mobile}</li>
                    </ul>
                    
                    <h4>Next Steps:</h4>
                    <ol>
                        <li>The employer will review your application within 2-3 business days</li>
                        <li>If shortlisted, you will receive an email for interview scheduling</li>
                        <li>You can track your application status in your dashboard</li>
                    </ol>
                    
                    <p>We wish you the best of luck with your application!</p>
                    
                    <p>Best regards,<br>
                    <strong>StudentJob Portal Team</strong><br>
                    <small>This is an automated confirmation email. Please do not reply.</small></p>
                </div>
            `;
            
            modal.classList.add('show');
        }

        // Close email modal
        function closeEmailModal() {
            document.getElementById('emailModal').classList.remove('show');
            currentJob = null;
        }

        // Send confirmation email
        function sendConfirmationEmail() {
            if (!currentJob || !currentStudent) return;
            
            appliedJobs.push(currentJob.id);
            
            const emailContent = {
                to: currentStudent.email,
                subject: `✅ Application Confirmed: ${currentJob.title}`,
                body: `
                    <h3>Application Confirmation</h3>
                    <p>Your application for ${currentJob.title} has been submitted successfully!</p>
                    <p>Application ID: APP-${currentJob.id}-${Date.now().toString().slice(-6)}</p>
                `
            };

            addToEmailLog(emailContent);
            
            // Close modal
            closeEmailModal();
            
            // Refresh display
            displayJobs('all');
            
            // Update stats
            document.getElementById('appliedCount').textContent = appliedJobs.length;
            
            showNotification(`Application submitted! Confirmation email sent to ${currentStudent.email}`, 'success');
        }

        // Add to email log
        function addToEmailLog(emailContent) {
            const timestamp = new Date().toLocaleString();
            
            emailLog.unshift({
                ...emailContent,
                timestamp
            });
            
            updateEmailLog();
        }

        // Update email log display
        function updateEmailLog() {
            const logContainer = document.getElementById('emailLog');
            
            if (emailLog.length === 0) {
                logContainer.innerHTML = '<p style="text-align: center; color: #6b7280; padding: 20px;">No emails sent yet</p>';
                return;
            }
            
            logContainer.innerHTML = emailLog.map(email => `
                <div class="email-log-item">
                    <i class="fas fa-envelope-open-text"></i>
                    <div>
                        <strong>To:</strong> ${email.to}<br>
                        <small>${email.subject}</small>
                    </div>
                    <div class="email-time">${email.timestamp}</div>
                </div>
            `).join('');
        }

        // Create category filters
        function createCategoryFilters() {
            const filterContainer = document.getElementById('categoryFilters');
            filterContainer.innerHTML = '<span class="category-chip active" onclick="filterJobs(\'all\')"><i class="fas fa-th-large"></i> All Jobs (12)</span>';
            
            Object.entries(categories).forEach(([key, value]) => {
                const count = jobs.filter(job => job.category === key).length;
                filterContainer.innerHTML += `
                    <span class="category-chip" onclick="filterJobs('${key}')">
                        <i class="fas ${value.icon}"></i> ${value.name} (${count})
                    </span>
                `;
            });
        }

        // Filter jobs by category
        function filterJobs(category) {
            // Update active state
            document.querySelectorAll('.category-chip').forEach(chip => {
                chip.classList.remove('active');
            });
            event.target.closest('.category-chip').classList.add('active');
            
            displayJobs(category);
        }

        // Display jobs
        function displayJobs(category) {
            const grid = document.getElementById('jobsGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filteredJobs = jobs;
            
            if (category !== 'all') {
                filteredJobs = filteredJobs.filter(job => job.category === category);
            }
            
            if (searchTerm) {
                filteredJobs = filteredJobs.filter(job => 
                    job.title.toLowerCase().includes(searchTerm) ||
                    job.company.toLowerCase().includes(searchTerm) ||
                    job.location.toLowerCase().includes(searchTerm)
                );
            }

            // Apply salary filter
            const salaryFilter = document.getElementById('salaryFilter').value;
            if (salaryFilter !== 'all') {
                filteredJobs = filteredJobs.filter(job => {
                    if (salaryFilter === '0-150') return job.salary <= 150;
                    if (salaryFilter === '150-200') return job.salary > 150 && job.salary <= 200;
                    if (salaryFilter === '200-250') return job.salary > 200 && job.salary <= 250;
                    if (salaryFilter === '250+') return job.salary > 250;
                });
            }

            if (filteredJobs.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; background: white; border-radius: 15px;"><i class="fas fa-search" style="font-size: 48px; color: #9ca3af; margin-bottom: 15px;"></i><h3>No jobs found</h3><p>Try adjusting your filters</p></div>';
                return;
            }

            grid.innerHTML = filteredJobs.map(job => {
                const category = categories[job.category];
                const isApplied = appliedJobs.includes(job.id);
                
                return `
                    <div class="job-card">
                        <div class="job-category-badge" style="background: ${category.color}">
                            <i class="fas ${category.icon}"></i> ${category.name}
                        </div>
                        <h3>${job.title}</h3>
                        <div class="job-company">
                            <i class="fas fa-building"></i> ${job.company}
                        </div>
                        <div class="job-details">
                            <div class="job-detail-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <span>${job.location}</span>
                            </div>
                            <div class="job-detail-item">
                                <i class="far fa-clock"></i>
                                <span>${job.hours} • ${job.schedule}</span>
                            </div>
                            <div class="job-detail-item">
                                <i class="fas fa-briefcase"></i>
                                <span>${job.type}</span>
                            </div>
                            <div class="job-detail-item">
                                <i class="fas fa-info-circle"></i>
                                <span>${job.description.substring(0, 60)}...</span>
                            </div>
                        </div>
                        <div class="job-salary">
                            <i class="fas fa-rupee-sign"></i> ${job.salary}/hr
                            <small>estimated</small>
                        </div>
                        <div class="job-footer">
                            <span class="job-type">${job.type}</span>
                            ${isApplied ? 
                                '<span class="applied-badge"><i class="fas fa-check"></i> Applied</span>' : 
                                `<button class="apply-job-btn" onclick="applyForJob(${job.id})" ${!currentStudent ? 'disabled' : ''}>
                                    <i class="fas fa-paper-plane"></i> Apply Now
                                </button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');

            // Update stats
            if (currentStudent) {
                const categoryCount = filteredJobs.filter(job => job.category === currentStudent.category).length;
                document.getElementById('interestedCount').textContent = categoryCount;
            }
        }

        // Search jobs
        function searchJobs() {
            const activeChip = document.querySelector('.category-chip.active');
            const category = activeChip ? activeChip.textContent.includes('All') ? 'all' : 
                Object.keys(categories).find(key => categories[key].name === activeChip.textContent.split('(')[0].trim()) : 'all';
            displayJobs(category);
        }

        // Filter by salary
        function filterBySalary() {
            searchJobs();
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            const messageSpan = document.getElementById('notificationMessage');
            const icon = document.getElementById('notificationIcon');
            
            messageSpan.textContent = message;
            
            if (type === 'error') {
                icon.className = 'fas fa-exclamation-circle';
                notification.style.borderLeftColor = '#ef4444';
            } else {
                icon.className = 'fas fa-check-circle';
                notification.style.borderLeftColor = '#10b981';
            }
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Check if student is registered from URL params
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const roll = urlParams.get('roll');
            if (roll) {
                document.getElementById('rollNumber').value = roll;
            }
        };

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('emailModal');
            if (event.target === modal) {
                closeEmailModal();
            }
        };
    </script>
